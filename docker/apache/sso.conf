# Redirection HTTP vers HTTPS
<VirtualHost *:80>
    ServerName intranet.silvadec.local
    Redirect permanent / https://intranet.silvadec.local/
</VirtualHost>

# Configuration HTTPS
<VirtualHost *:443>
    ServerName intranet.silvadec.local
    
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/votre_certificat.crt
    SSLCertificateKeyFile /etc/apache2/ssl/votre_cle.key

    ProxyPass / http://webserver:80/
    ProxyPassReverse / http://webserver:80/

    <Location /sso-login>
        AuthType GSSAPI
        # ... (le reste de votre configuration Kerberos reste identique)
    </Location>
</VirtualHost>