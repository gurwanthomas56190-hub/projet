# Redirection dynamique de HTTP (80) vers HTTPS (443)
<VirtualHost *:80>
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# Configuration du serveur HTTPS
<VirtualHost *:443>
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/sso.crt
    SSLCertificateKeyFile /etc/apache2/ssl/sso.key

    # On transmet tout le trafic normal vers ton conteneur Nginx
    ProxyPass / http://webserver:80/
    ProxyPassReverse / http://webserver:80/

    # Interception SSO Kerberos
    <Location /sso-login>
        AuthType GSSAPI
        AuthName "Connexion Automatique Intranet"
        GssapiCredStore keytab:/etc/krb5.keytab
        Require valid-user

        # On injecte l'identité Windows de l'utilisateur
        RequestHeader set X-Remote-User expr=%{REMOTE_USER}
    </Location>
</VirtualHost>