<VirtualHost *:80>
    ServerName intranet.silvadec.local

    # On transmet tout le trafic normal vers ton conteneur Nginx
    ProxyPass / http://webserver:80/
    ProxyPassReverse / http://webserver:80/

    # MAIS on intercepte la route de connexion automatique pour forcer Kerberos
    <Location /sso-login>
        AuthType Negotiate
        AuthName "Connexion Automatique Intranet"
        GssapiCredStore keytab:/etc/krb5.keytab
        Require valid-user

        # On injecte l'identité Windows de l'utilisateur dans le header pour Laravel
        RequestHeader set X-Remote-User %{REMOTE_USER}e
    </Location>
</VirtualHost>
