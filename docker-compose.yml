services:
  app:
    build: .
    container_name: laravel_app
    volumes:
      - .:/var/www
      - /mnt/partage_windows:/mnt/win_share
    env_file:
      - .env
    networks:
      - laravel_network

  webserver:
    image: nginx:alpine
    container_name: laravel_web
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - laravel_network
    depends_on:
      - app

networks:
  laravel_network:
    driver: bridge